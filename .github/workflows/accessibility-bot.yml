name: Accessibility bot

on:
  issues:
    types: [opened, edited]

  pull_request:
    types: [opened, edited]

  issue_comment:
    types: [created, edited]

  discussion:
    types: [created, edited]

  discussion_comment:
    types: [created, edited]

permissions:
  issues: write
  pull-requests: write
  discussions: write

jobs:
  images:
    name: Check images
    runs-on: ubuntu-22.04

    steps:
      - name: Check images for alt text
        uses: github/accessibility-alt-text-bot@7e895d46677f15841def9acef1239ea7c12593a5 # v1.7.3
