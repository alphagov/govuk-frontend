name: 'RELEASE: Build release'

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'New version number eg: 5.3.1'
        required: true
        type: string

permissions:
  contents: write
  pull-requests: write

jobs:
  build-release:
    name: Build release
    runs-on: Ubuntu-22.04
    env:
      VERSION: ${{ inputs.version }}
      GITHUB_ACTOR: ${{ github.actor }}

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc

      - name: Install dependencies
        run: npm ci

      - name: Validate version
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            const { validateVersion } = await import('${{ github.workspace }}/shared/github-scripts/changelog-release-helper.mjs')
            const frontendPackage = await import('${{ github.workspace }}/packages/govuk-frontend/package.json', { with: { type: 'json' }})

            validateVersion(process.env.VERSION, frontendPackage.default.version)

      - name: Update CHANGELOG
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            const { updateChangelog } = await import('${{ github.workspace }}/shared/github-scripts/changelog-release-helper.mjs')
            const frontendPackage = await import('${{ github.workspace }}/packages/govuk-frontend/package.json', { with: { type: 'json' }})

            updateChangelog(process.env.VERSION, frontendPackage.default.version)

      - name: Update package version
        run: npm version --no-git-tag-version --workspace govuk-frontend ${VERSION}

      - name: Generate release notes
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            const { generateReleaseNotes } = await import('${{ github.workspace }}/shared/github-scripts/changelog-release-helper.mjs')

            generateReleaseNotes(process.env.VERSION, { actor: process.env.GITHUB_ACTOR, runId: '${{ github.run_id }}' })

      - name: Build release
        run: npm run build:release

      - name: Create pull request
        env:
          GH_TOKEN: ${{ secrets.CI_PAT }}
        run: |
          git config --global user.name '${GITHUB_ACTOR}'
          git config --global user.email '${GITHUB_ACTOR}@digital.cabinet-office.gov.uk'
          git add .
          git commit -m "Release ${VERSION}"
          git checkout -b release-${VERSION}
          git push -u origin release-${VERSION}
          gh pr create --base main --head release-${VERSION} --title "Release ${VERSION}" --body-file "release-notes-body"
