name: 'RELEASE: npm publish'
run-name: "RELEASE: npm publish${{ inputs.dry_run && ' (Dry run)' || '' }}"

on:
  workflow_dispatch:
    inputs:
      dry_run:
        type: boolean
        description: Dry run
        default: true

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-22.04
    permissions:
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Setup Node
        uses: actions/setup-node@v6.4.0
        with:
          node-version-file: .nvmrc
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci

      - name: Generate tag
        id: generate_tag
        run: |
          TAG=$(npm run generate-npm-tag --silent)
          echo "NPM_TAG=${TAG}" >> $GITHUB_OUTPUT

      - name: Build npm package
        run: npm run build:package

      - name: Publish to npm
        if: inputs.dry_run == false
        run: npm publish --workspace govuk-frontend --provenance --tag ${{steps.generate_tag.outputs.NPM_TAG}}
