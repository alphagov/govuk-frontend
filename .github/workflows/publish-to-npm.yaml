name: Publish release to npm

on:
  workflow_dispatch:

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-22.04
    env:
      NPM_TAG: ''

    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2

      - name: Setup Node
        uses: actions/setup-node@v4.1.0
        with:
          node-version-file: .nvmrc
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci

      - name: Check version
        # Check that the version number is unique
        # Check that it is valid for type of release
        # Check that it is greater than previous release
        # Potentially using generate-npm-tag.sh
        # Generate npm tag?
        run:

      - name: Build npm package
        run: npm run build:package

      - name: Publish to npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run:
          npm publish --workspace govuk-frontend --dry-run --tag ${{env.NPM_TAG}}
          # npm publish --workspace govuk-frontend --tag ${{env.NPM_TAG}} --provenance --access public
