params:
  - name: titleText
    type: string
    required: true
    description: If `titleHtml` is set, this is not required. Text to use within the Feedback component. If `titleHtml` is provided, the `titleText` option will be ignored.
  - name: titleHtml
    type: string
    required: true
    description: If `titleText` is set, this is not required. HTML to use within the Feedback component. If `titleHtml` is provided, the `titleText` option will be ignored.
  - name: headingLevel
    type: integer
    required: false
    description: Heading level, from `1` to `6`. Default is `2`.
  - name: text
    type: string
    required: true
    description: If `html` is set, this is not required. Text to use within the Feedback component content. If `html` is provided, the `text` option will be ignored.
  - name: html
    type: string
    required: true
    description: If `text` is set, this is not required. HTML to use within the Feedback component content. If `html` is provided, the `text` option will be ignored.
  - name: caller
    type: nunjucks-block
    required: false
    description: Not strictly a parameter but [Nunjucks code convention](https://mozilla.github.io/nunjucks/templating.html#call). Using a `call` block enables you to call a macro with all the text inside the tag. This is helpful if you want to pass a lot of content into a macro. To use it, you will need to wrap the entire panel component in a `call` block.
  - name: classes
    type: string
    required: false
    description: Classes to add to the panel container.
  - name: attributes
    type: object
    required: false
    description: HTML attributes (for example data attributes) to add to the panel container.

examples:
  - name: default
    screenshot: true
    options:
      titleText: Help us improve this service
      html: |
        Tell us about your experience using this service. <a href="#" class="govuk-link">Give us your feedback</a>

  # Hidden examples are not shown in the review app, but are used for tests and HTML fixtures
  - name: html in title
    options:
      titleHtml: Help us improve this <em>cool</em> service
      html: |
        Tell us about your experience using this service. <a href="#" class="govuk-link">Give us your feedback</a>

  - name: custom heading level
    options:
      titleText: Help us improve this service
      headingLevel: 3
      html: |
        Tell us about your experience using this service. <a href="#" class="govuk-link">Give us your feedback</a>

  - name: html in text options
    options:
      titleText: Help us improve this <em>cool</em> service
      text: Tell us about your experience using this <em>cool</em> service

  - name: classes
    options:
      titleText: Help us improve this service
      html: |
        Tell us about your experience using this service. <a href="#" class="govuk-link">Give us your feedback</a>
      classes: my-first-class my-second-class

  - name: attributes
    options:
      titleText: Help us improve this service
      html: |
        Tell us about your experience using this service. <a href="#" class="govuk-link">Give us your feedback</a>
      attributes:
        first-attribute: first
        second-attribute: second
