params:
  - name: titleText
    type: string
    required: true
    description: If `titleHtml` is set, this is not required. Text to use within the panel. If `titleHtml` is provided, the `titleText` option will be ignored.
  - name: titleHtml
    type: string
    required: true
    description: If `titleText` is set, this is not required. HTML to use within the panel. If `titleHtml` is provided, the `titleText` option will be ignored.
  - name: headingLevel
    type: integer
    required: false
    description: Heading level, from `1` to `6`. Default is `1`.
  - name: text
    type: string
    required: true
    description: If `html` is set, this is not required. Text to use within the panel content. If `html` is provided, the `text` option will be ignored.
  - name: html
    type: string
    required: true
    description: If `text` is set, this is not required. HTML to use within the panel content. If `html` is provided, the `text` option will be ignored.
  - name: caller
    type: nunjucks-block
    required: false
    description: Not strictly a parameter but [Nunjucks code convention](https://mozilla.github.io/nunjucks/templating.html#call). Using a `call` block enables you to call a macro with all the text inside the tag. This is helpful if you want to pass a lot of content into a macro. To use it, you will need to wrap the entire panel component in a `call` block.
  - name: classes
    type: string
    required: false
    description: Classes to add to the panel container.
  - name: attributes
    type: object
    required: false
    description: HTML attributes (for example data attributes) to add to the panel container.

examples:
  - name: default
    screenshot: true
    options:
      titleHtml: Application complete
      text: 'Your reference number: HDJ2123F'
  - name: custom heading level
    options:
      titleText: Application complete
      headingLevel: 2
      text: 'Your reference number: HDJ2123F'
  - name: interruption
    options:
      titleText: Is your age correct?
      html: |
        <p>You entered your age as <strong>109</strong>.</p>
        <div class="govuk-button-group">
          <button type="submit" class="govuk-button govuk-button--inverse" data-module="govuk-button">
            Yes, this is correct
          </button>
          <a href="#" class="govuk-link govuk-link--inverse">Change my age</a>
        </div>
      classes: govuk-panel--interruption

  - name: interruption with body classes
    options:
      titleText: This defect is for the vehicles newer than the one you're testing
      html: |
        <p class="govuk-body">You have selected the defect <strong>Tyre pressure monitoring system inoperative</strong>.</p>
        <p class="govuk-body">It is only for vehicles <strong>first used from 1st April 2023</strong>.</p>
        <p class="govuk-body">Make sure you have selected the correct defect.</p>
        <div class="govuk-button-group">
          <button type="submit" class="govuk-button govuk-button--inverse" data-module="govuk-button">
            Defect is correct - continue
          </button>
          <a href="#" class="govuk-link govuk-link--inverse">Cancel and return to defects</a>
        </div>
      classes: govuk-panel--interruption

  - name: interruption with lists
    options:
      titleText: We need to check who you are before you can make your choice
      html: |
        <p class="govuk-body">We'll need your:</p>
        <ul class="govuk-list govuk-list--bullet">
          <li>name</li>
          <li>date of birth</li>
          <li>postcode or NHS number</li>
        </ul>
        <p class="govuk-body">We'll use these details tro find your contact details from your health records so we can send you a security code.</p>
        <div class="govuk-button-group">
          <button type="submit" class="govuk-button govuk-button--inverse" data-module="govuk-button">
            Continue
          </button>
          <a href="#" class="govuk-link govuk-link--inverse">Cancel</a>
        </div>
        <p class="govuk-body"><a href="#" class="govuk-link govuk-link--inverse">How your data will be processed</a> (opens in a new window)</p>
      classes: govuk-panel--interruption

  # Hidden examples are not shown in the review app, but are used for tests and HTML fixtures
  - name: title html as text
    hidden: true
    options:
      titleText: Application <strong>not</strong> complete
      text: Please complete form 1
  - name: title html
    hidden: true
    options:
      titleHtml: Application <strong>not</strong> complete
      html: Please complete <strong>form 1</strong>
  - name: body html as text
    hidden: true
    options:
      titleText: Application complete
      text: Your reference number<br><strong>HDJ2123F</strong>
  - name: body html
    hidden: true
    options:
      titleText: Application complete
      html: Your reference number<br><strong>HDJ2123F</strong>
  - name: classes
    hidden: true
    options:
      titleText: Application complete
      text: Your reference number is HDJ2123F
      classes: extra-class one-more-class
  - name: attributes
    hidden: true
    options:
      titleText: Application complete
      text: Your reference number is HDJ2123F
      attributes:
        first-attribute: foo
        second-attribute: bar
  - name: title with no body text
    hidden: true
    options:
      titleText: Application complete
  - name: custom heading level
    hidden: true
    options:
      titleText: Application complete
      headingLevel: 2
      text: 'Your reference number: HDJ2123F'
